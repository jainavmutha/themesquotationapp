name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: curtain-quotation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: curtain-quotation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run dist

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            curtain-quotation/dist/**
            curtain-quotation/release/**
            curtain-quotation/out/**
          if-no-files-found: warn